<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Portfolio of Abhishek Kumar Bhatt — Full Stack Java Developer specializing in Spring Boot, React, and Android." />
    <title>Abhishek Bhatt | Full Stack Developer</title>
    <style>
      /* Loading spinner — removed automatically when React mounts into #root */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #020617;
      }
      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
